<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me - Baraah Yaser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background-color: #f5f5f0;
      color: #222;
    }

    nav {
      background-color: #1a1a2e;
      padding: 14px 30px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }
    nav ul li a {
      color: #ffffff;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 15px;
    }
    nav ul li a:hover { text-decoration: underline; }

    header {
      background-color: #1a1a2e;
      color: white;
      text-align: center;
      padding: 30px 20px;
      border-bottom: 4px solid #e2b04a;
    }
    header h1 { font-size: 26px; }

    main {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .form-box {
      background-color: #ffffff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 32px 36px;
    }

    .form-box h2 {
      font-size: 20px;
      color: #1a1a2e;
      border-bottom: 2px solid #e2b04a;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #1a1a2e;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      font-family: Georgia, serif;
      background-color: #fafafa;
    }

    .form-group textarea {
      height: 110px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #1a1a2e;
    }

    button[type="button"] {
      background-color: #1a1a2e;
      color: white;
      border: none;
      padding: 11px 28px;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      margin-top: 6px;
    }

    button[type="button"]:hover {
      background-color: #e2b04a;
      color: #1a1a2e;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #1a1a2e;
      color: #aaa;
      font-size: 13px;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="contact.html">Contact Me</a></li>
    </ul>
  </nav>

  <header>
    <h1>Contact Me</h1>
  </header>

  <main>
    <div class="form-box">
      <h2>Send a Message</h2>

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email address" />
      </div>

      <div class="form-group">
        <label for="country">Country</label>
        <input type="text" id="country" placeholder="Enter your country" />
      </div>

      <div class="form-group">
        <label for="comments">Comments</label>
        <textarea id="comments" placeholder="Write your comments here..."></textarea>
      </div>

      <button type="button" onclick="submitForm()">Submit</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Baraah Yaser &mdash; Student ID: 171703 &mdash; JUST University</p>
  </footer>

  <script>
    function submitForm() {
      var fullname = document.getElementById("fullname").value.trim();
      var email    = document.getElementById("email").value.trim();
      var country  = document.getElementById("country").value.trim();
      var comments = document.getElementById("comments").value.trim();

      if (fullname === "" || email === "" || country === "" || comments === "") {
        alert("Please fill in all fields before submitting.");
        return;
      }

      alert("Thank you, " + fullname + "! Your message has been submitted successfully.");

      document.getElementById("fullname").value  = "";
      document.getElementById("email").value     = "";
      document.getElementById("country").value   = "";
      document.getElementById("comments").value  = "";
    }
  </script>

</body>
</html>
